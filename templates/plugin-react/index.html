<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>uframe React plugin — standalone playground</title>
    <style>body { font: 15px system-ui; margin: 2rem; display: grid; gap: 1rem; max-width: 40rem }</style>
  </head>
  <body>
    <h1>Callout block (React → custom element)</h1>
    <uf-callout-react tone="info" text="Info from React"></uf-callout-react>
    <uf-callout-react tone="success" text="Success from React"></uf-callout-react>
    <uf-callout-react tone="warning" text="Warning from React"></uf-callout-react>
    <uf-callout-react tone="danger" text="Danger from React"></uf-callout-react>
    <script type="module" src="/playground/main.ts"></script>
  </body>
</html>
