name: Publish npm package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

      - name: Use current npm CLI
        run: npm install --global npm@latest

      - name: Show npm trusted-publisher identity
        run: |
          node --input-type=module <<'NODE'
          const url = new URL(process.env.ACTIONS_ID_TOKEN_REQUEST_URL)
          url.searchParams.set('audience', 'npm:registry.npmjs.org')

          const response = await fetch(url, {
            headers: { Authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` },
          })
          if (!response.ok)
            throw new Error(`Could not request OIDC identity: ${response.status}`)

          const { value } = await response.json()
          const claim = JSON.parse(Buffer.from(value.split('.')[1], 'base64url').toString())
          console.log(JSON.stringify({
            repository: claim.repository,
            workflow_ref: claim.workflow_ref,
            environment: claim.environment,
          }, null, 2))
          NODE

      - name: Release from Conventional Commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes --package semantic-release@24 --package @semantic-release/exec --package @semantic-release/git semantic-release
